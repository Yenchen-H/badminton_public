<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏸 羽球積分板｜Aceternity Light</title>
<style>

:root{
  --bg:#f8fbff;
  --bg2:#eef6ff;
  --panel:rgba(255,255,255,.82);
  --panel-strong:rgba(255,255,255,.94);
  --line:rgba(120,150,190,.18);
  --text:#16324f;
  --muted:#6c8198;
  --primary:#3b82f6;
  --primary-2:#60a5fa;
  --success:#10b981;
  --danger:#ef4444;
  --warning:#f59e0b;
  --shadow:0 10px 35px rgba(69,110,167,.10);
  --shadow-soft:0 6px 20px rgba(69,110,167,.08);
  --radius:22px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;
  background:
    radial-gradient(circle at 15% 20%, rgba(96,165,250,.18), transparent 28%),
    radial-gradient(circle at 85% 12%, rgba(45,212,191,.14), transparent 25%),
    radial-gradient(circle at 50% 100%, rgba(191,219,254,.22), transparent 32%),
    linear-gradient(180deg, #fbfdff 0%, #f6faff 45%, #f2f7ff 100%);
  color:var(--text);
  padding:24px 16px 48px;
  position:relative;
}
body:before{
  content:"";
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(120,150,190,.055) 1px, transparent 1px),linear-gradient(90deg, rgba(120,150,190,.055) 1px, transparent 1px);
  background-size:34px 34px;
  mask-image:radial-gradient(circle at center, black 45%, transparent 95%);
}
.app{max-width:980px;margin:0 auto;position:relative;z-index:1}
.card,.hist-card,.upcoming-card,.match-card,.rank-row,.sess-item,.metric,.modal,.pts-card{
  background:var(--panel);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line);
  box-shadow:var(--shadow-soft);
}
.card,.hist-card,.upcoming-card,.modal{border-radius:var(--radius)}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  margin-bottom:18px;padding:18px 20px;border-radius:28px;
  background:linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.72));
  border:1px solid rgba(120,150,190,.16);box-shadow:var(--shadow);
}
.app-title{
  font-size:clamp(24px,4vw,36px);font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(135deg,#0f172a 0%, #2563eb 45%, #0ea5e9 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.sync-badge{
  font-size:12px;padding:9px 14px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.84);color:var(--muted);cursor:pointer;box-shadow:var(--shadow-soft)
}
.sync-badge.ok{background:rgba(236,253,245,.95);border-color:rgba(16,185,129,.25);color:#047857}
.sync-badge.err{background:rgba(254,242,242,.95);border-color:rgba(239,68,68,.25);color:#b91c1c}
.sync-badge.loading{background:rgba(239,246,255,.95);border-color:rgba(59,130,246,.25);color:#1d4ed8}
.tab-nav{
  display:flex;gap:10px;overflow-x:auto;margin-bottom:20px;padding:8px;
  background:rgba(255,255,255,.74);border:1px solid var(--line);border-radius:999px;box-shadow:var(--shadow-soft)
}
.tab-nav button{
  flex-shrink:0;font-size:13px;padding:10px 16px;border:none;background:transparent;cursor:pointer;
  color:var(--muted);border-radius:999px;font-family:inherit;white-space:nowrap;font-weight:600;transition:.2s ease;
}
.tab-nav button.on{
  color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2));
  box-shadow:0 8px 22px rgba(59,130,246,.28)
}
.card{padding:22px;margin-bottom:16px}
.btn{
  font-size:13px;padding:9px 15px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.9);color:var(--text);cursor:pointer;font-family:inherit;font-weight:700;transition:.18s ease;
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-soft)}
.btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border-color:transparent}
.btn.success{background:linear-gradient(135deg,#10b981,#34d399);color:#fff;border-color:transparent}
.btn.courtB{background:linear-gradient(135deg,#10b981,#2dd4bf);color:#fff;border-color:transparent}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.danger{color:#b91c1c;border-color:rgba(239,68,68,.18);background:rgba(255,255,255,.92)}
input[type=text],input[type=number],input[type=date],input[type=password]{
  font-size:13px;padding:10px 12px;border-radius:14px;border:1px solid rgba(120,150,190,.18);
  background:rgba(255,255,255,.95);color:var(--text);font-family:inherit;box-shadow:inset 0 1px 0 rgba(255,255,255,.75)
}
input:focus{outline:3px solid rgba(96,165,250,.18);border-color:rgba(59,130,246,.35)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.lbl{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:700;letter-spacing:.02em}
.p-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px;margin-bottom:10px}
.p-chip{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:16px;border:1px solid var(--line);cursor:pointer;user-select:none;font-size:13px;transition:all .18s;background:rgba(255,255,255,.72)}
.p-chip.on{background:rgba(239,246,255,.95);border-color:rgba(59,130,246,.3);color:#1d4ed8;font-weight:700;box-shadow:0 10px 20px rgba(59,130,246,.12)}
.p-chip .dot{width:9px;height:9px;border-radius:50%;background:#cbd5e1;flex-shrink:0}
.p-chip.on .dot{background:linear-gradient(135deg,var(--primary),var(--primary-2))}
.pc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(75px,1fr));gap:8px;margin-bottom:10px}
.pc-chip{text-align:center;padding:8px 6px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.84)}
.pc-chip .pcn{font-size:12px;font-weight:700;color:var(--text)}
.pc-chip .pcc{font-size:11px;color:var(--muted)}
.match-list{display:flex;flex-direction:column;gap:12px}
.match-card{border-radius:24px;overflow:hidden;position:relative}
.match-card:before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,transparent 15%, rgba(255,255,255,.4) 50%, transparent 85%);opacity:.45}
.match-card.ca{box-shadow:0 14px 36px rgba(59,130,246,.10)}
.match-card.cb{box-shadow:0 14px 36px rgba(16,185,129,.10)}
.match-card.done{opacity:.86}
.mc-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,.56);border-bottom:1px solid var(--line)}
.mc-lbl{font-size:12px;font-weight:800;color:var(--muted)}
.mc-lbl.a{color:#2563eb}.mc-lbl.b{color:#059669}
.sb{display:flex;align-items:center;padding:18px 12px;gap:8px}
.sb-side{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;min-width:0}
.sb-names{font-size:14px;font-weight:700;text-align:center;line-height:1.6;word-break:break-word}
.sb-names.win{color:#047857}.sb-names.lose{color:#94a3b8}
.sb-score{font-size:52px;font-weight:800;line-height:1;letter-spacing:-.04em;color:#0f172a}
.sb-score.leading{background:linear-gradient(135deg,#2563eb,#0ea5e9);-webkit-background-clip:text;background-clip:text;color:transparent}
.sb-btns{display:flex;gap:10px}
.sb-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.96);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:var(--shadow-soft)}
.sb-btn:active{transform:scale(.94)}
.sb-btn.plus{border-color:rgba(59,130,246,.22);color:#2563eb}
.sb-btn.minus{border-color:rgba(239,68,68,.22);color:#dc2626}
.sb-vs{color:#94a3b8;font-size:13px;flex-shrink:0;padding:0 4px;font-weight:700}
.sb-confirm,.waiting-bar{background:rgba(255,255,255,.52);border-top:1px solid var(--line)}
.sb-confirm{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;padding:12px 14px}
.waiting-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:9px 14px;font-size:12px;color:var(--muted)}
.w-chip{font-size:12px;padding:4px 9px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#334155}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.metric{border-radius:24px;padding:18px 18px;background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(255,255,255,.72))}
.metric .ml{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}
.metric .mv{font-size:28px;font-weight:800;letter-spacing:-.04em}
.rank-list{display:flex;flex-direction:column;gap:10px}
.rank-row{align-items:center;display:flex;gap:12px;padding:14px 16px;border-radius:24px;position:relative;overflow:hidden}
.rank-row:after{content:"";position:absolute;top:0;bottom:0;left:-30%;width:40%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-24deg);animation:shimmer 6.5s infinite}
.rank-pos{width:30px;font-size:14px;font-weight:800;color:var(--muted);text-align:center;flex-shrink:0}
.rank-pos.gold{color:#b45309}.rank-pos.silver{color:#475569}.rank-pos.bronze{color:#b45309}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;background:linear-gradient(135deg,#dbeafe,#eff6ff);color:#1d4ed8;border:1px solid rgba(59,130,246,.12)}
.rank-name{flex:1;font-size:15px;font-weight:700}
.rank-pts{font-size:17px;font-weight:800;min-width:42px;text-align:right}
.bar-track{flex:1;height:7px;background:#e8f0fa;border-radius:999px;overflow:hidden;min-width:54px}
.bar-fill{height:100%;border-radius:999px;transition:width .65s ease;background:linear-gradient(90deg,#60a5fa,#38bdf8)}
.sess-list,.rank-list{display:flex;flex-direction:column}
.sess-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:18px;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.84);margin-bottom:8px}
.sess-item:hover{transform:translateY(-1px)}
.sess-item.on{border-color:rgba(59,130,246,.28);background:rgba(239,246,255,.96)}
.sess-date{font-size:12px;color:var(--muted);flex-shrink:0;min-width:68px}
.sess-name{flex:1;font-size:14px;font-weight:700}
.sess-meta{font-size:12px;color:#94a3b8;flex-shrink:0}
.sess-del{font-size:12px;padding:5px 8px;border-radius:999px;border:1px solid rgba(239,68,68,.18);background:transparent;color:#b91c1c;cursor:pointer;font-family:inherit;opacity:0;transition:opacity .15s}
.sess-item:hover .sess-del{opacity:1}
.hist-card,.upcoming-card{padding:16px 18px;margin-bottom:12px}
.h-table{width:100%;border-collapse:collapse;font-size:13px}
.h-table th{font-size:12px;color:var(--muted);padding:7px 8px;border-bottom:1px solid var(--line);text-align:left;font-weight:800}
.h-table td{padding:9px 8px;border-bottom:1px solid var(--line)}
.h-table tr:last-child td{border-bottom:none}
.h-table td.r{text-align:right}
.mrow,.upcoming-match{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:16px;font-size:13px;margin-bottom:7px}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.18);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{padding:1.5rem;width:min(360px,90vw);display:flex;flex-direction:column;gap:12px}
.modal h2{font-size:18px;font-weight:800}
.modal .err{font-size:12px;color:#b91c1c;min-height:16px}
.player-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--line)}
.pts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.pts-card{border-radius:16px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:13px}
.empty{text-align:center;padding:2.2rem;color:#94a3b8;font-size:14px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
.divider{border:none;border-top:1px solid var(--line);margin:12px 0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{left:-35%} 100%{left:130%}}
@media(max-width:640px){
  body{padding:16px 12px 40px}
  .topbar{padding:16px 18px;border-radius:24px}
  .metrics{grid-template-columns:1fr}
  .sb{padding:16px 8px}
  .sb-score{font-size:40px}
  .card,.hist-card,.upcoming-card{padding:18px}
}

</style>
</head>
<body>
<div class="app">

<!-- 密碼彈窗 -->
<div class="modal-bg" id="pwModal" style="display:none">
  <div class="modal">
    <h2>🔒 管理員驗證</h2>
    <input type="password" id="pwInput" placeholder="輸入管理密碼">
    <div class="err" id="pwErr"></div>
    <div class="row" style="margin-bottom:0;justify-content:flex-end">
      <button type="button" class="btn" onclick="closePwModal()">取消</button>
      <button type="button" class="btn primary" onclick="submitPw()">確認</button>
    </div>
  </div>
</div>

<div class="topbar">
  <span class="app-title">🏸 羽球積分板</span>
  <span class="sync-badge" id="syncBadge" onclick="pullFromCloud()"><span class="spinner"></span>讀取中</span>
</div>
<div class="card" style="padding:20px 22px;margin-bottom:18px;background:linear-gradient(180deg,rgba(255,255,255,.88),rgba(255,255,255,.72))">
  <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap">
    <div>
  </div>
</div>
<div class="tab-nav">
  <button type="button" class="on" onclick="showTab('rank')">排行榜</button>
  <button type="button" onclick="showTab('play')">今日賽程</button>
  <button type="button" onclick="showTab('upcoming')">待進行</button>
  <button type="button" onclick="showTab('history')">歷史紀錄</button>
  <button type="button" onclick="requireAdmin(()=>showTab('settings'))">⚙ 設定</button>
</div>

<!-- 排行榜 -->
<div id="tab-rank">
  <div class="metrics" id="metricCards">
    <div class="metric"><div class="ml">讀取中</div><div class="mv">—</div></div>
    <div class="metric"><div class="ml">活動場次</div><div class="mv">—</div></div>
    <div class="metric"><div class="ml">參賽人數</div><div class="mv">—</div></div>
  </div>
  <div class="rank-list" id="rankList"></div>
</div>

<!-- 今日賽程 -->
<div id="tab-play" style="display:none">
  <div class="card">
    <p class="lbl" style="margin-bottom:10px">選擇或新增場次</p>
    <div class="row">
      <input type="date" id="newDate" style="width:140px">
      <input type="text" id="newSessName" placeholder="場次名稱（可選）" style="flex:1;min-width:110px">
      <button type="button" class="btn primary" onclick="createSession()">＋ 新增</button>
    </div>
    <div class="sess-list" id="sessList"></div>
  </div>
  <div id="sessContent"></div>
</div>

<!-- 待進行 -->
<div id="tab-upcoming" style="display:none">
  <div id="upcomingContent"></div>
</div>

<!-- 歷史紀錄 -->
<div id="tab-history" style="display:none">
  <div id="histContent"></div>
</div>

<!-- 設定（需密碼） -->
<div id="tab-settings" style="display:none">
  <div class="card">
    <p class="lbl" style="margin-bottom:10px">選手名單</p>
    <div class="row"><input type="text" id="newPlayerName" placeholder="新增選手姓名" style="width:150px"><button type="button" class="btn primary" onclick="addPlayer()">＋ 新增</button></div>
    <div id="playerListEl"></div>
  </div>
  <div class="card">
    <p class="lbl" style="margin-bottom:4px">計分規則</p>
    <p style="font-size:12px;color:#aaa;margin-bottom:10px">贏一場 → 上場兩人各得分數</p>
    <div class="row" style="margin-bottom:0">
      <span style="font-size:13px">每勝得</span>
      <input type="number" id="winPtsInput" min="1" max="10" value="2" style="width:60px" onchange="winPts=parseInt(this.value)||2;localSave()">
      <span style="font-size:13px">分</span>
    </div>
  </div>
  <div class="card">
    <p class="lbl" style="margin-bottom:4px">雲端設定</p>
    <p style="font-size:12px;color:#aaa;margin-bottom:8px">Google Apps Script Web App URL</p>
    <input type="text" id="cfgUrl" placeholder="貼上 Web App URL" style="width:100%;margin-bottom:8px">
    <button type="button" class="btn primary" onclick="saveCfg()">儲存並同步</button>
  </div>
  <div class="card">
    <p class="lbl" style="margin-bottom:10px">備份與還原</p>
    <div class="row" style="margin-bottom:0">
      <button type="button" class="btn success" onclick="exportJSON()">📤 匯出備份</button>
      <button type="button" class="btn" onclick="document.getElementById('importFile').click()">📂 匯入還原</button>
      <button type="button" class="btn" onclick="exportCSV()">📥 匯出 CSV</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
  </div>
  <div class="card">
    <p class="lbl" style="margin-bottom:10px">密碼管理</p>
    <div class="row" style="margin-bottom:0">
      <input type="password" id="newPwInput" placeholder="設定新密碼" style="width:160px">
      <button type="button" class="btn" onclick="changePw()">更新密碼</button>
    </div>
  </div>
  <div class="card">
    <p class="lbl" style="margin-bottom:10px">危險操作</p>
    <button type="button" class="btn danger" onclick="if(confirm('確定清除全部資料？'))clearAll()">清除全部資料</button>
  </div>
</div>
</div>

<script>
/* ================================================
   ★ 修改這裡 ★
   ================================================ */
const FIXED_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwRjwm2aUz6gqLFdzJvQnoU1_Qh0qwdO5YTXiYU-wdn_P7zlrOBWNnKSD6ql2RLFp1f/exec';
const DEFAULT_PLAYERS   = ['Yinglee','YC黃','伍彬彬','劉部長','小羅','小寶','雅瑄','宜芳','JOJO','詠婕','語喬'];
const WIN_PTS_DEFAULT   = 2;

/* ================================================
   色彩
   ================================================ */
const AV_BG=['#B5D4F4','#C0DD97','#FAC775','#F4C0D1','#9FE1CB','#CECBF6','#F5C4B3','#F7C1C1','#D3D1C7','#EF9F27','#85B7EB'];
const AV_FG=['#0C447C','#27500A','#633806','#72243E','#085041','#3C3489','#712B13','#791F1F','#444441','#412402','#042C53'];
function avBg(i){return AV_BG[i%AV_BG.length];}
function avFg(i){return AV_FG[i%AV_FG.length];}
function initials(n){return n.trim().slice(0,2).toUpperCase();}

/* ================================================
   狀態
   ================================================ */
let players=[], sessions=[], winPts=WIN_PTS_DEFAULT;
let activeSessionId=null, adminUnlocked=false, pendingAdminAction=null;
const liveScores={};
let WEB_APP_URL=FIXED_WEB_APP_URL||localStorage.getItem('bm_url')||'';

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtDate(d){if(!d)return'';const p=d.split('-');return p[0]+'/'+(+p[1])+'/'+(+p[2]);}
function fmtNow(){const t=new Date();return t.getHours()+':'+String(t.getMinutes()).padStart(2,'0');}
function getSess(id){return sessions.find(s=>s.id===id);}

/* ================================================
   密碼管理
   ================================================ */
function getStoredPw(){return localStorage.getItem('bm_pw')||'';}
function requireAdmin(action){
  if(adminUnlocked){action();return;}
  pendingAdminAction=action;
  document.getElementById('pwModal').style.display='flex';
  setTimeout(()=>document.getElementById('pwInput').focus(),100);
}
function submitPw(){
  const pw=document.getElementById('pwInput').value;
  const stored=getStoredPw();
  if(!stored){
    localStorage.setItem('bm_pw',pw);
    adminUnlocked=true;
    closePwModal();
    if(pendingAdminAction){pendingAdminAction();pendingAdminAction=null;}
    return;
  }
  if(pw===stored){
    adminUnlocked=true;closePwModal();
    if(pendingAdminAction){pendingAdminAction();pendingAdminAction=null;}
  }else{
    document.getElementById('pwErr').textContent='密碼錯誤';
    setTimeout(()=>document.getElementById('pwErr').textContent='',2000);
  }
}
function closePwModal(){
  document.getElementById('pwModal').style.display='none';
  document.getElementById('pwInput').value='';
}
function changePw(){
  const np=document.getElementById('newPwInput').value.trim();
  if(!np){alert('請輸入新密碼');return;}

/* ================================================
   雲端同步
   ================================================ */
function setSyncBadge(state,txt){
  const el=document.getElementById('syncBadge');
  el.className='sync-badge';
  el.innerHTML=txt||state;
  if(state==='ok')el.classList.add('ok');
  else if(state==='err')el.classList.add('err');
  else if(state==='loading')el.innerHTML='<span class="spinner"></span>'+(txt||'讀取中');
}
async function pullFromCloud(){
  if(!WEB_APP_URL||WEB_APP_URL==='YOUR_WEB_APP_URL_HERE'){setSyncBadge('err','未設定 URL');renderAll();return;}
  setSyncBadge('loading');
  try{
    const res=await fetch(WEB_APP_URL+'?action=getData&t='+Date.now());
    const data=await res.json();
    if(!data.ok)throw new Error(data.error||'讀取失敗');
    // 只在雲端資料較新時才覆蓋（以場次數量判斷）
    const cloudSessCount=(data.sessions||[]).length;
    const localSessCount=sessions.length;
    if(cloudSessCount>=localSessCount){
      if(data.players&&data.players.length>0)players=data.players;
      if(data.sessions)sessions=data.sessions;
      if(data.winPts)winPts=data.winPts;
    }
    localSave();
    setSyncBadge('ok','同步 '+fmtNow());
    renderAll();
  }catch(e){setSyncBadge('err','同步失敗 (點擊重試)');renderAll();}
}
async function pushToCloud(cb){
  if(!WEB_APP_URL||WEB_APP_URL==='YOUR_WEB_APP_URL_HERE'){localSave();if(cb)cb();return;}
  setSyncBadge('loading','儲存中');
  try{
    const res=await fetch(WEB_APP_URL,{method:'POST',body:JSON.stringify({
      action:'saveAll',password:localStorage.getItem('bm_pw')||'__public__',
      players,sessions,winPts,ranking:getTotals()
    })});
    const json=await res.json();
    if(json.ok){localSave();setSyncBadge('ok','同步 '+fmtNow());if(cb)cb();}
    else{localSave();setSyncBadge('err','雲端失敗');if(cb)cb();}
  }catch(e){localSave();setSyncBadge('err','連線失敗');if(cb)cb();}
}
function saveCfg(){
  const u=(document.getElementById('cfgUrl')||{}).value.trim();
  if(u){WEB_APP_URL=u;localStorage.setItem('bm_url',u);}
  pushToCloud(()=>alert('設定已儲存！'));
}

/* ================================================
   統計
   ================================================ */
function calcScore(s){
  const sc={};(s.attendees||[]).forEach(p=>sc[p]=0);
  (s.matches||[]).forEach(m=>{
    const sa=parseInt(m.scoreA),sb=parseInt(m.scoreB);if(isNaN(sa)||isNaN(sb))return;
    if(sa>sb)(m.teamA||[]).forEach(p=>{if(sc[p]!==undefined)sc[p]+=winPts;});
    else if(sb>sa)(m.teamB||[]).forEach(p=>{if(sc[p]!==undefined)sc[p]+=winPts;});
  });
  return sc;
}
function calcWins(s){
  const w={};(s.attendees||[]).forEach(p=>w[p]=0);
  (s.matches||[]).forEach(m=>{
    const sa=parseInt(m.scoreA),sb=parseInt(m.scoreB);if(isNaN(sa)||isNaN(sb))return;
    if(sa>sb)(m.teamA||[]).forEach(p=>{if(w[p]!==undefined)w[p]++;});
    else if(sb>sa)(m.teamB||[]).forEach(p=>{if(w[p]!==undefined)w[p]++;});
  });
  return w;
}
function getTotals(){
  return players.map((p,pi)=>{
    let total=0,sessCount=0,wins=0;
    sessions.forEach(s=>{
      if(!(s.attendees||[]).includes(p))return;
      const sc=calcScore(s);const w=calcWins(s);
      if(sc[p]!==undefined){total+=sc[p];sessCount++;wins+=w[p]||0;}
    });
    return{name:p,total,sessCount,wins,idx:pi};
  }).sort((a,b)=>b.total-a.total||a.name.localeCompare(b.name));
}

/* ================================================
   抽籤
   ================================================ */
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function drawMatch(attendees,existingMatches,excludePlayers){
  excludePlayers=excludePlayers||[];
  const avail=attendees.filter(p=>!excludePlayers.includes(p));
  if(avail.length<4)return null;

  // 上場次數：所有已抽的場次都算（含進行中），抽完籤就算上場
  const playCount={};
  attendees.forEach(p=>playCount[p]=0);
  (existingMatches||[]).forEach(m=>{
    [...m.teamA,...m.teamB].forEach(p=>{if(playCount[p]!==undefined)playCount[p]++;});
  });

  // 同隊次數：所有已抽的場次都算
  const pairCount={};
  (existingMatches||[]).forEach(m=>{
    [[m.teamA[0],m.teamA[1]],[m.teamB[0],m.teamB[1]]].forEach(function(pair){
      var a=pair[0],b=pair[1];if(!a||!b)return;
      var key=[a,b].sort().join('|');pairCount[key]=(pairCount[key]||0)+1;
    });
  });

  const sorted=[...avail].sort((a,b)=>playCount[a]-playCount[b]);
  const minC=playCount[sorted[0]];
  // 取上場次數最少的人優先
  const pool=sorted.filter(p=>playCount[p]<=minC);
  const cands=(pool.length>=4?pool:sorted).slice(0,Math.max(4,pool.length));
  const picked=shuffle(cands).slice(0,4);
  const combos=[[[picked[0],picked[1]],[picked[2],picked[3]]],[[picked[0],picked[2]],[picked[1],picked[3]]],[[picked[0],picked[3]],[picked[1],picked[2]]]];
  const gps=(a,b)=>pairCount[[a,b].sort().join('|')]||0;
  combos.sort((x,y)=>(gps(x[0][0],x[0][1])+gps(x[1][0],x[1][1]))-(gps(y[0][0],y[0][1])+gps(y[1][0],y[1][1])));
  const teamA=combos[0][0],teamB=combos[0][1];
  const waiting=attendees.filter(p=>![...teamA,...teamB,...excludePlayers].includes(p));
  return{id:genId(),teamA,teamB,waiting,scoreA:'',scoreB:''};
}

  });
}

function todayStr(){
  const t=new Date();
  return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
}
function isSessionActive(s){
  // 今日賽程只顯示：1) 日期是今天 且 2) 尚未有任何已確認比分
  const today=todayStr();
  const hasScore=(s.matches||[]).some(m=>m.scoreA!==''&&m.scoreB!=='');
  return s.date===today && !hasScore;
}

function renderSessList(){
  const el=document.getElementById('sessList');
  const active=[...sessions].reverse().filter(s=>isSessionActive(s));
  if(!active.length){
    el.innerHTML='<div class="empty" style="padding:1rem;font-size:13px;color:#aaa">目前沒有進行中的場次<br>已完成或過去的場次請到「歷史紀錄」查看</div>';
    if(activeSessionId && !isSessionActive(getSess(activeSessionId))){
      activeSessionId=null;
      document.getElementById('sessContent').innerHTML='';
    }
    return;
  }
  let html='';
  active.forEach(s=>{
    const mc=(s.matches||[]).length;
    html+=`<div class="sess-item${activeSessionId===s.id?' on':''}" onclick="selectSess('${s.id}')">
      <div class="sess-date">${fmtDate(s.date)}</div>
      <div class="sess-name">${s.name||'未命名'}</div>
      <div class="sess-meta">${s.attendees?s.attendees.length+'人 ':''} ${mc?mc+'場':''}</div>
      <button class="sess-del" onclick="event.stopPropagation();requireAdmin(()=>deleteSess('${s.id}'))">刪除</button>
    </div>`;
  });
  el.innerHTML=html;
}

function renderSessContent(id){
  const s=getSess(id);
  if(!s){document.getElementById('sessContent').innerHTML='';return;}
  const el=document.getElementById('sessContent');
  let html='';

  // 出席名單
  html+=`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
      <p style="font-size:15px;font-weight:500">${s.name}</p>
      <span style="font-size:12px;color:#888">${fmtDate(s.date)}</span>
    </div>
    <p class="lbl">勾選今天出席的選手</p>
    <div class="p-grid">`;
  players.forEach(p=>{
    const on=(s.attendees||[]).includes(p);
    html+=`<div class="p-chip${on?' on':''}" onclick="toggleAttend('${id}','${p.replace(/'/g,"\\'")}',this)" data-name="${p}"><div class="dot"></div>${p}</div>`;
  });
  html+=`</div><span style="font-size:12px;color:#888" id="ac_${id}">${(s.attendees||[]).length} 人出席</span></div>`;

  // 抽籤 + 比賽
  if(s.attendees&&s.attendees.length>=4){
    const playCount={};
    s.attendees.forEach(p=>playCount[p]=0);
    // 顯示上場次數：已確認 + 進行中都計入（抽完籤就立刻顯示）
    (s.matches||[]).forEach(m=>{
      [...m.teamA,...m.teamB].forEach(p=>{if(playCount[p]!==undefined)playCount[p]++;});
    });

    html+=`<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <p class="lbl" style="margin-bottom:0">本次 ${(s.matches||[]).length} 場</p>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button type="button" class="btn primary" onclick="addMatchCourt('${id}','A')">＋ 場地 A</button>
          <button type="button" class="btn courtB" onclick="addMatchCourt('${id}','B')">＋ 場地 B</button>
        </div>
      </div>
      <div class="pc-grid">`;
    s.attendees.forEach(p=>{
      html+=`<div class="pc-chip"><div class="pcn">${p}</div><div class="pcc">上場 ${playCount[p]} 次</div></div>`;
    });
    html+=`</div>`;

    if(s.matches&&s.matches.length){
      html+=`<div class="match-list">`;
      s.matches.forEach((m,mi)=>{html+=renderMatchCard(s,m,mi);});
      html+=`</div>`;
    }else{
      html+=`<p style="text-align:center;padding:1.5rem;color:#aaa;font-size:13px">按「＋ 場地 A」開始抽籤</p>`;
    }
    html+=`</div>`;

    // 小結
    const hasScored=(s.matches||[]).some(m=>m.scoreA!==''&&m.scoreB!=='');
    if(hasScored){
      const sc=calcScore(s);const wins=calcWins(s);
      const sorted=[...s.attendees].sort((a,b)=>(sc[b]||0)-(sc[a]||0));
      html+=`<div class="card"><p class="lbl" style="margin-bottom:10px">本場積分小結</p>
        <table class="h-table"><thead><tr><th>排名</th><th>選手</th><th>勝場</th><th class="r">積分</th></tr></thead><tbody>`;
      let rank=1;
      sorted.forEach((p,i)=>{
        if(i>0&&(sc[sorted[i]]||0)!==(sc[sorted[i-1]]||0))rank=i+1;
        html+=`<tr><td>${rank}</td><td>${p}</td><td>${wins[p]||0}</td><td class="r"><strong>${sc[p]||0}</strong></td></tr>`;
      });
      html+=`</tbody></table></div>`;
    }
  }else if(s.attendees&&s.attendees.length>0){
    html+=`<div class="card"><div class="empty">需要至少 4 人才能開始抽籤</div></div>`;
  }
  el.innerHTML=html;
}

function renderMatchCard(s,m,mi){
  const live=liveScores[m.id]||{a:parseInt(m.scoreA)||0,b:parseInt(m.scoreB)||0};
  const isDone=m.scoreA!==''&&m.scoreB!=='';
  const sa=isDone?parseInt(m.scoreA):live.a;
  const sb=isDone?parseInt(m.scoreB):live.b;
  const aWin=sa>sb,bWin=sb>sa;
  const court=m.court||'';
  const nameA=(m.teamA||[]).join(' & ');
  const nameB=(m.teamB||[]).join(' & ');
  let body='';
  if(isDone){
    body=`<div class="sb">
      <div class="sb-side">
        <div class="sb-names${aWin?' win':bWin?' lose':''}">${(m.teamA||[]).join('<br>&amp; ')}</div>
        <div class="sb-score${aWin?' leading':''}">${sa}</div>
      </div>
      <div class="sb-vs">:</div>
      <div class="sb-side">
        <div class="sb-score${bWin?' leading':''}">${sb}</div>
        <div class="sb-names${bWin?' win':aWin?' lose':''}">${(m.teamB||[]).join('<br>&amp; ')}</div>
      </div>
    </div>`;
  }else{
    body=`<div class="sb">
      <div class="sb-side">
        <div class="sb-names">${(m.teamA||[]).join('<br>&amp; ')}</div>
        <div class="sb-score${live.a>live.b?' leading':''}" id="la_${m.id}">${live.a}</div>
        <div class="sb-btns">
          <button type="button" class="sb-btn minus" onclick="adj('${s.id}','${m.id}','a',-1,${mi})">−</button>
          <button type="button" class="sb-btn plus" onclick="adj('${s.id}','${m.id}','a',+1,${mi})">＋</button>
        </div>
      </div>
      <div class="sb-vs">vs</div>
      <div class="sb-side">
        <div class="sb-score${live.b>live.a?' leading':''}" id="lb_${m.id}">${live.b}</div>
        <div class="sb-names">${(m.teamB||[]).join('<br>&amp; ')}</div>
        <div class="sb-btns">
          <button type="button" class="sb-btn minus" onclick="adj('${s.id}','${m.id}','b',-1,${mi})">−</button>
          <button type="button" class="sb-btn plus" onclick="adj('${s.id}','${m.id}','b',+1,${mi})">＋</button>
        </div>
      </div>
    </div>
    <div class="sb-confirm">
      <button type="button" class="btn success" id="cfbtn_${m.id}" onclick="confirmScore('${s.id}','${m.id}')">✓ 確認 ${live.a} : ${live.b}</button>
      <button type="button" class="btn sm danger" onclick="requireAdmin(()=>delMatch('${s.id}',${mi}))">移除</button>
    </div>`;
  }
  return `<div class="match-card${court?' c'+court.toLowerCase():''}${isDone?' done':''}" id="mc_${s.id}_${mi}">
    <div class="mc-head">
      <span class="mc-lbl${court?' '+court.toLowerCase():''}">${court?'場地 '+court+' · ':''}第 ${mi+1} 場${isDone?' ✓':''}</span>
      ${isDone?`<button type="button" class="btn sm danger" onclick="undoScore('${s.id}','${m.id}',${mi})">重打</button>`:''}
    </div>
    ${body}
    ${m.waiting&&m.waiting.length?`<div class="waiting-bar">等待：${m.waiting.map(p=>'<span class="w-chip">'+p+'</span>').join('')}</div>`:''}
  </div>`;
}

function adj(sid,mid,side,delta,mi){
  if(!liveScores[mid])liveScores[mid]={a:0,b:0};
  liveScores[mid][side]=Math.max(0,liveScores[mid][side]+delta);
  const live=liveScores[mid];
  const la=document.getElementById('la_'+mid);
  const lb=document.getElementById('lb_'+mid);
  if(la){la.textContent=live.a;la.className='sb-score'+(live.a>live.b?' leading':'');}
  if(lb){lb.textContent=live.b;lb.className='sb-score'+(live.b>live.a?' leading':'');}
  const cb=document.getElementById('cfbtn_'+mid);
  if(cb)cb.textContent='✓ 確認 '+live.a+' : '+live.b;
}

function confirmScore(sid,mid){
  const s=getSess(sid);if(!s)return;
  const m=s.matches.find(mm=>mm.id===mid);if(!m)return;
  const live=liveScores[mid]||{a:0,b:0};
  if(live.a===0&&live.b===0&&!confirm('比分都是 0，確定？'))return;
  m.scoreA=String(live.a);m.scoreB=String(live.b);
  delete liveScores[mid];
  pushToCloud(()=>{
    const s=getSess(sid);
    if(s && !isSessionActive(s)){
      activeSessionId=null;
      document.getElementById('sessContent').innerHTML='';
    } else {
      renderSessContent(sid);
    }
    renderRank();renderSessList();renderHistory();
  });
}

function undoScore(sid,mid,mi){
  if(!confirm('確定重打？比分將清除。'))return;
  const s=getSess(sid);if(!s)return;
  const m=s.matches.find(mm=>mm.id===mid);if(!m)return;
  liveScores[mid]={a:parseInt(m.scoreA)||0,b:parseInt(m.scoreB)||0};
  m.scoreA='';m.scoreB='';
  pushToCloud(()=>{renderSessContent(sid);renderRank();renderSessList();});
}

function toggleAttend(sid,name,el){
  const s=getSess(sid);if(!s)return;
  el.classList.toggle('on');
  s.attendees=[];
  document.querySelectorAll('.p-chip.on').forEach(c=>s.attendees.push(c.dataset.name));
  const ac=document.getElementById('ac_'+sid);if(ac)ac.textContent=s.attendees.length+' 人出席';
  pushToCloud(()=>{renderSessList();});
}

function addMatchCourt(sid,court){
  const s=getSess(sid);if(!s||!s.attendees||s.attendees.length<4)return;
  let exclude=[];
  if(court==='B'&&s.matches.length>0){
    const last=s.matches[s.matches.length-1];
    if(last.court==='A')exclude=[...last.teamA,...last.teamB];
  }
  if(s.attendees.filter(p=>!exclude.includes(p)).length<4){alert('可用人數不足 4 人');return;}
  const m=drawMatch(s.attendees,s.matches,exclude);
  if(!m){alert('無法抽籤');return;}
  m.court=court;
  liveScores[m.id]={a:0,b:0};
  s.matches.push(m);
  pushToCloud(()=>{renderSessContent(sid);renderSessList();});
}

function delMatch(sid,mi){
  const s=getSess(sid);if(!s)return;
  if(!confirm('確定移除這場？'))return;
  const m=s.matches[mi];if(m)delete liveScores[m.id];
  s.matches.splice(mi,1);
  pushToCloud(()=>{renderSessContent(sid);renderSessList();});
}

function renderUpcoming(){
  const el=document.getElementById('upcomingContent');
  const upcoming=sessions.filter(s=>{
    if(!s.matches||!s.matches.length)return false;
    return !s.matches.some(m=>m.scoreA!==''||m.scoreB!=='');
  });
  if(!upcoming.length){el.innerHTML='<div class="empty">目前沒有待進行的賽程</div>';return;}
  let html='';
  upcoming.forEach(s=>{
    html+=`<div class="upcoming-card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <span style="font-size:15px;font-weight:500">${s.name||'未命名'}</span>
        <span style="font-size:12px;color:#888">${fmtDate(s.date)} · ${(s.attendees||[]).length}人 · ${s.matches.length}場</span>
      </div>`;
    s.matches.forEach((m,mi)=>{
      const court=m.court?'場地 '+m.court+' · ':'';
      html+=`<div class="upcoming-match">
        <span style="font-size:11px;color:#aaa;min-width:70px;flex-shrink:0">${court}第 ${mi+1} 場</span>
        <span style="flex:1;font-weight:500">${(m.teamA||[]).join(' & ')}</span>
        <span style="color:#aaa;font-size:12px;flex-shrink:0;padding:0 8px">vs</span>
        <span style="flex:1;font-weight:500;text-align:right">${(m.teamB||[]).join(' & ')}</span>
      </div>
      ${m.waiting&&m.waiting.length?`<p style="font-size:12px;color:#aaa;margin-bottom:4px;padding:0 2px">等待：${m.waiting.join('・')}</p>`:''}`;
    });
    html+=`</div>`;
  });
  el.innerHTML=html;
}

/* ================================================
   歷史紀錄
   ================================================ */
function renderHistory(){
  const el=document.getElementById('histContent');
  if(!sessions.length){el.innerHTML='<div class="empty">尚無歷史紀錄</div>';return;}
  let html='';
  [...sessions].reverse().forEach(s=>{
    const sc=calcScore(s);const wins=calcWins(s);
    const sorted=(s.attendees||[]).slice().sort((a,b)=>(sc[b]||0)-(sc[a]||0));
    const scored=(s.matches||[]).filter(m=>m.scoreA!==''&&m.scoreB!=='');
    html+=`<div class="hist-card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <div><span style="font-size:15px;font-weight:500">${s.name||'未命名'}</span>
          <span style="font-size:12px;color:#888;margin-left:8px">${fmtDate(s.date)}</span></div>
        <span style="font-size:12px;color:#aaa">${(s.attendees||[]).length}人 · ${(s.matches||[]).length}場</span>
      </div>`;
    if(sorted.length&&scored.length){
      html+=`<table class="h-table" style="margin-bottom:10px"><thead><tr><th>排名</th><th>選手</th><th>勝場</th><th class="r">積分</th></tr></thead><tbody>`;
      let rank=1;sorted.forEach((p,i)=>{
        if(i>0&&(sc[sorted[i]]||0)!==(sc[sorted[i-1]]||0))rank=i+1;
        html+=`<tr><td>${rank}</td><td>${p}</td><td>${wins[p]||0}</td><td class="r"><strong>${sc[p]||0}</strong></td></tr>`;
      });
      html+=`</tbody></table>`;
    }
    scored.forEach(m=>{
      const sa=parseInt(m.scoreA),sb=parseInt(m.scoreB);
      const aWin=sa>sb,bWin=sb>sa;
      const allIdx=(s.matches||[]).indexOf(m);
      const court=m.court?'場地 '+m.court+' · ':'';
      html+=`<div class="mrow">
        <span style="font-size:11px;color:#aaa;min-width:72px;flex-shrink:0">${court}第 ${allIdx+1} 場</span>
        <span style="flex:1;font-weight:500;color:${aWin?'#0F6E56':bWin?'#bbb':'#1a1a18'}">${(m.teamA||[]).join(' & ')}</span>
        <span style="font-size:15px;font-weight:500;flex-shrink:0;padding:0 8px">${sa} : ${sb}</span>
        <span style="flex:1;font-weight:500;text-align:right;color:${bWin?'#0F6E56':aWin?'#bbb':'#1a1a18'}">${(m.teamB||[]).join(' & ')}</span>
      </div>`;
    });
    html+=`</div>`;
  });
  el.innerHTML=html;
}

/* ================================================
   設定
   ================================================ */
function renderSettings(){
  renderPlayerList();
  const wu=document.getElementById('cfgUrl');if(wu)wu.value=WEB_APP_URL;
  const wi=document.getElementById('winPtsInput');if(wi)wi.value=winPts;
  const np=document.getElementById('newPlayerName');
  if(np&&!np.onkeydown)np.addEventListener('keydown',e=>{if(e.key==='Enter')addPlayer();});
}
function addPlayer(){
  const inp=document.getElementById('newPlayerName');
  const n=inp.value.trim();
  if(!n){inp.focus();return;}
  if(players.includes(n)){alert('已有同名選手');inp.focus();return;}
  players.push(n);
  inp.value='';
  inp.focus();
  localSave();
  // 只更新選手列表，不重繪整個設定頁（避免輸入框狀態遺失）
  renderPlayerList();
  renderRank();
}

function renderPlayerList(){
  const pl=document.getElementById('playerListEl');
  if(!pl)return;
  if(!players.length){pl.innerHTML='<div class="empty">尚無選手</div>';return;}
  let html='<div style="display:flex;flex-direction:column">';
  players.forEach((p,i)=>{
    html+=`<div class="player-row">
      <div class="avatar" style="background:${avBg(i)};color:${avFg(i)};width:28px;height:28px;font-size:11px;flex-shrink:0">${initials(p)}</div>
      <span style="flex:1;font-size:13px">${p}</span>
      <button type="button" class="btn sm danger" onclick="removePlayer(${i})">移除</button>
    </div>`;
  });
  html+='</div>';
  pl.innerHTML=html;
}
function removePlayer(i){
  if(!confirm('確定移除「'+players[i]+'」？'))return;
  players.splice(i,1);localSave();renderPlayerList();renderRank();
}
function clearAll(){sessions=[];activeSessionId=null;pushToCloud(()=>{document.getElementById('sessContent').innerHTML='';renderAll();});}

/* ================================================
   匯出 / 匯入
   ================================================ */
function exportJSON(){
  const blob=new Blob([JSON.stringify({players,sessions,winPts,exportTime:new Date().toISOString()},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='羽球積分板備份.json';a.click();URL.revokeObjectURL(url);
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.players||!data.sessions){alert('格式不符');return;}
      if(!confirm('確定匯入？會覆蓋目前的資料。'))return;
      players=data.players;sessions=data.sessions;winPts=data.winPts||2;
      pushToCloud(()=>{renderAll();alert('✓ 匯入成功！');});
    }catch(err){alert('匯入失敗');}
  };
  reader.readAsText(file);e.target.value='';
}
function exportCSV(){
  const totals=getTotals();
  let csv='排名,選手,總積分,出賽場次,累計勝場\n';
  totals.forEach((p,i)=>{csv+=`${i+1},${p.name},${p.total},${p.sessCount},${p.wins}\n`;});
  csv+='\n場次明細\n場次,日期,出席人數,場數\n';
  sessions.forEach(s=>{csv+=`${s.name},${s.date},${(s.attendees||[]).length},${(s.matches||[]).length}\n`;});
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='羽球積分板.csv';a.click();URL.revokeObjectURL(url);
}
