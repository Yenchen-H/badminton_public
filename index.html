<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏸 羽球積分板｜進階版</title>
<style>
:root{
  --bg:#f8fbff;
  --bg2:#eef6ff;
  --panel:rgba(255,255,255,.82);
  --panel-strong:rgba(255,255,255,.94);
  --line:rgba(120,150,190,.18);
  --text:#16324f;
  --muted:#6c8198;
  --primary:#3b82f6;
  --primary-2:#60a5fa;
  --success:#10b981;
  --danger:#ef4444;
  --warning:#f59e0b;
  --shadow:0 10px 35px rgba(69,110,167,.10);
  --shadow-soft:0 6px 20px rgba(69,110,167,.08);
  --radius:22px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;
  background-color:var(--bg);
  background-image:radial-gradient(at 0% 0%,hsla(210,100%,98%,1) 0,transparent 50%),radial-gradient(at 100% 100%,hsla(215,100%,96%,1) 0,transparent 50%);
  color:var(--text);
  line-height:1.6;
  -webkit-tap-highlight-color:transparent;
}
.app-container{max-width:540px;margin:0 auto;padding:16px 16px 100px;min-height:100vh}
header{margin-bottom:28px;padding-left:6px}
header h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;color:var(--text);display:flex;align-items:center;gap:10px}
header p{color:var(--muted);font-size:14px;margin-top:4px}

.nav-tabs{display:grid;grid-template-columns:repeat(4,1fr);background:var(--panel);padding:6px;border-radius:18px;margin-bottom:24px;border:1px solid var(--line);box-shadow:var(--shadow-soft)}
.nav-tab{border:none;background:0 0;padding:10px 4px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:12px;transition:all .25s ease;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav-tab i{font-size:18px}
.nav-tab.active{background:#fff;color:var(--primary);box-shadow:0 4px 12px rgba(59,130,246,.12)}

.card{background:var(--panel-strong);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius);padding:22px;margin-bottom:20px;border:1px solid var(--line);box-shadow:var(--shadow)}
.card-title{font-size:17px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px}

.btn{border:none;border-radius:14px;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff}
.btn.success{background:var(--success);color:#fff}
.btn.danger{background:var(--danger);color:#fff}
.btn.outline{background:0 0;border:1.5px solid var(--line);color:var(--muted)}
.btn:active{transform:scale(.97)}

input,select{width:100%;padding:12px 16px;border-radius:14px;border:1px solid var(--line);background:#fff;font-size:15px;color:var(--text);transition:all .2s}
input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,.1)}

.match-card{background:var(--bg2);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--line)}
.match-header{font-size:12px;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between}
.match-vs{display:flex;align-items:center;justify-content:space-between;gap:10px}
.team{flex:1;display:flex;flex-direction:column;gap:4px;font-weight:600;font-size:15px}
.score-input{width:55px;text-align:center;font-weight:800;font-size:18px;padding:8px 0}
.vs-text{color:var(--muted);font-weight:800;font-size:12px}

.upcoming-card{background:#fff;border-radius:18px;padding:18px;margin-bottom:16px;border:1px solid var(--line);box-shadow:var(--shadow-soft)}
.rank-item{display:flex;align-items:center;padding:14px;background:#fff;border-radius:16px;margin-bottom:10px;border:1px solid var(--line)}
.rank-num{width:32px;font-weight:800;font-size:18px;color:var(--primary)}
.rank-info{flex:1}
.rank-name{font-weight:700;font-size:16px}
.rank-stats{font-size:12px;color:var(--muted)}
.rank-score{font-weight:800;font-size:18px;color:var(--text)}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-top:1px solid var(--line);padding:10px 0 30px;display:none}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<div class="app-container">
  <header>
    <h1>🏸 羽球積分板</h1>
    <p>管理您的賽事、積分與排名</p>
  </header>

  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('rank')"><i>📊</i>排名</button>
    <button class="nav-tab" onclick="showPage('play')"><i>🎾</i>今日賽程</button>
    <button class="nav-tab" onclick="showPage('upcoming')"><i>⏳</i>待進行</button>
    <button class="nav-tab" onclick="showPage('history')"><i>📜</i>紀錄</button>
    <button class="nav-tab" onclick="showPage('manage')"><i>⚙️</i>管理</button>
  </nav>

  <div id="page-rank" class="page">
    <div class="card">
      <div class="card-title">積分排行榜</div>
      <div id="rankContent"></div>
    </div>
  </div>

  <div id="page-play" class="page" style="display:none">
    <div class="card">
      <div class="card-title">步驟一：選擇或新增場次</div>
      <div style="margin-bottom:12px">
        <select id="sessionSelector" onchange="onSessionSelect()">
          <option value="">-- 選擇既有場次 --</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <input type="text" id="newSessName" placeholder="場次名稱 (例: 週三晚排)">
        <input type="date" id="newSessDate">
      </div>
      <button class="btn outline" style="width:100%;margin-top:10px" onclick="createNewSession()">建立新場次</button>
    </div>

    <div id="sessionActionArea" style="display:none">
      <div class="card">
        <div class="card-title">步驟二：安排賽程</div>
        <div style="margin-bottom:12px">
          <p style="font-size:13px;color:var(--muted);margin-bottom:8px">選擇本次出席球員：</p>
          <div id="attendeeChecklist" style="display:flex;flex-wrap:wrap;gap:8px"></div>
        </div>
        <button class="btn primary" style="width:100%" onclick="drawMatches()">自動隨機抽籤 (4人一組)</button>
        
        <div id="currentMatches" style="margin-top:20px"></div>
        
        <div id="confirmArea" style="display:none;margin-top:20px;text-align:center">
          <button id="cfAllBtn" class="btn success" style="width:100%;padding:15px" onclick="confirmAllScores()">✓ 確認全部比分</button>
        </div>
      </div>
    </div>
  </div>

  <div id="page-upcoming" class="page" style="display:none">
    <div id="upcomingContent"></div>
  </div>

  <div id="page-history" class="page" style="display:none">
    <div id="historyContent"></div>
  </div>

  <div id="page-manage" class="page" style="display:none">
    <div class="card">
      <div class="card-title">選手管理</div>
      <div style="display:flex;gap:10px;margin-bottom:15px">
        <input type="text" id="playerName" placeholder="選手姓名">
        <button class="btn primary" onclick="addPlayer()">新增</button>
      </div>
      <div id="playerList"></div>
    </div>
    <div class="card">
      <div class="card-title">數據管理</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button class="btn outline" onclick="exportData()">備份 JSON</button>
        <button class="btn outline" onclick="document.getElementById('importFile').click()">匯入 JSON</button>
      </div>
      <input type="file" id="importFile" style="display:none" onchange="importData(event)">
      <button class="btn danger" style="width:100%;margin-top:10px" onclick="clearAllData()">⚠️ 清空所有資料</button>
    </div>
  </div>
</div>

<script>
let players = JSON.parse(localStorage.getItem('bmt_players')) || [];
let sessions = JSON.parse(localStorage.getItem('bmt_sessions')) || [];
let currentSessionId = null;
let liveScores = {}; 

// 初始化
function init() {
  document.getElementById('newSessDate').value = todayStr();
  renderAll();
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function save() {
  localStorage.setItem('bmt_players', JSON.stringify(players));
  localStorage.setItem('bmt_sessions', JSON.stringify(sessions));
  renderAll();
}

function renderAll() {
  renderRank();
  renderSessionSelector();
  renderUpcoming();
  renderHistory();
  renderPlayerList();
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).style.display = 'block';
  event.currentTarget.classList.add('active');
}

/* --- 核心邏輯修正 --- */

// 1. 修改判斷：只要是「今天日期」或「還沒填完分數」的都算在今日賽程
function isSessionActive(s) {
  const today = todayStr();
  const hasUnfinished = (s.matches || []).some(m => m.scoreA === '' || m.scoreB === '');
  const noMatches = !(s.matches && s.matches.length);
  return s.date === today || hasUnfinished || noMatches;
}

function renderSessionSelector() {
  const sel = document.getElementById('sessionSelector');
  sel.innerHTML = '<option value="">-- 選擇既有場次 --</option>';
  // 過濾出 active 的場次
  const actives = sessions.filter(isSessionActive);
  actives.forEach(s => {
    sel.innerHTML += `<option value="${s.id}">${s.date} ${s.name}</option>`;
  });
}

function onSessionSelect() {
  currentSessionId = document.getElementById('sessionSelector').value;
  if (!currentSessionId) {
    document.getElementById('sessionActionArea').style.display = 'none';
    return;
  }
  document.getElementById('sessionActionArea').style.display = 'block';
  renderAttendeeChecklist();
  renderCurrentMatches();
}

function createNewSession() {
  const name = document.getElementById('newSessName').value || '未命名場次';
  const date = document.getElementById('newSessDate').value;
  const id = 's_' + Date.now();
  sessions.push({ id, name, date, attendees: [], matches: [] });
  save();
  document.getElementById('sessionSelector').value = id;
  onSessionSelect();
}

function renderAttendeeChecklist() {
  const s = sessions.find(x => x.id === currentSessionId);
  const container = document.getElementById('attendeeChecklist');
